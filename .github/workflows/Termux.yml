🧩 AI 工廠核心入口（你需要的 main.py 概念）

class ControlTower:
    def __init__(self):
        self.agents = []

    def register_agent(self, agent):
        self.agents.append(agent)

    def run(self):
        print("AI Factory Started")
        for agent in self.agents:
            agent.execute()


class Agent:
    def __init__(self, name):
        self.name = name

    def execute(self):
        print(f"Running agent: {self.name}")


if __name__ == "__main__":
    tower = ControlTower()

    tower.register_agent(Agent("planner"))
    tower.register_agent(Agent("executor"))
    tower.register_agent(Agent("monitor"))

    tower.run()


