🚀 終極版 AI Agent Workflow（GitHub Actions / Termux 通用）

🧠 架構定位

這個 workflow 做三件事：

初始化 AI Agent 環境

啟動任務調度（orchestrator）

執行你的 AI 工廠腳本（run loop）



---

📦 版本 1：GitHub Actions（終極穩定版）

name: Lightning-AI-Agent-Workflow

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"  # 每30分鐘啟動一次 agent loop

jobs:
  ai-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Load Environment
        run: |
          echo "AI_AGENT_MODE=production" >> $GITHUB_ENV
          echo "RUN_FACTORY=enabled" >> $GITHUB_ENV

      - name: Run AI Orchestrator
        run: |
          python main.py


