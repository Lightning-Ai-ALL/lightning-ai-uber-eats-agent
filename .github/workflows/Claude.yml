**流程說明：**

1. **push 到 main** → 觸發 workflow
2. **build-and-push job**：checkout 程式碼 → 登入 Docker Hub → build image → 推送兩個 tag(`commit sha` 和 `latest`)
3. **deploy job**：等 build 完成後，用 SSH 連進你的自建伺服器，拉最新 image，把舊 container 停掉刪掉，再用新 image 起一個新 container

**你需要事先準備的東西：**

- GitHub repo 的 Secrets 裡加：`DOCKERHUB_USERNAME`、`DOCKERHUB_TOKEN`、`SERVER_HOST`、`SERVER_USER`、`SERVER_SSH_KEY`
- 伺服器上要有 Docker,且該 SSH 使用者要有權限跑 docker 指令
- 記得把 `IMAGE_NAME`、container 名稱、port 對應改成你實際的設定

