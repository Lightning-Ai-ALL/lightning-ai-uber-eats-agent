### 重點摘要
「Lightning-AI-Uber-Eats-Agent」的核心目標是將 **Uber Eats 外送訂餐流程自動化**，透過多代理（Multi-Agent）協作系統，完成從「需求分析 → 餐廳搜尋 → 菜單選擇 → 訂單確認 → 支付預備」的端到端工作流。此專案嚴格遵循 Lightning_AI_Full 的三層架構規範。
### 可執行步驟
若要啟動或擴展此工作流，請依照以下步驟進行：
 1. **環境部署**：確保 Python 3.11+ 環境，安裝 fastapi, langgraph, pydantic 等核心依賴。
 2. **任務分發（Coordinator）**：將使用者自然語言需求（例如：「幫我點一份附近評價最高的韓式料理」）拆解為 Task ID。
 3. **代理執行（Executor）**：
   * **Planner**：規劃搜尋與決策路徑。
   * **Builder**：呼叫 API 獲取餐廳與菜單數據。
   * **Reviewer**：檢查菜單價格與配送時間是否符合限制。
 4. **安全過濾（Private Core）**：系統會自動攔截敏感參數（如 Token、用戶地址），由 Private Core 處理，不輸出至公共層。
 5. **優化調整（Optimizer）**：針對訂單執行效率進行結構優化。
### 系統架構概念
### 專案結構建議
為了符合您 Lightning_AI_Full 的開發規範，建議調整後的目錄樹如下：
```text
lightning-ai-uber-eats-agent/
├── public/                 # 公開層
│   ├── api/                # FastAPI 接口定義
│   ├── sdk/                # 供外部呼叫的 SDK
│   └── examples/           # 使用範例
├── collaboration/          # 協作層 (Multi-Agent)
│   ├── agents/             # 各角色邏輯 (Coordinator, Builder, Reviewer, Optimizer)
│   └── workflows/          # LangGraph 執行工作流定義
├── private_core/           # 私有核心 (永不公開)
│   ├── config/             # .env (敏感設定)
│   ├── memory/             # 向量資料庫與長期記憶
│   └── routing/            # 模型路由決策
└── main.py                 # 系統入口

```
