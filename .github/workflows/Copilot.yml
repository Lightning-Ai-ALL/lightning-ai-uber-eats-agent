Lightning-AI-Uber-Eats-Agent 的工作流程核心在於「多階段 Agent 架構」：先理解需求，再生成購物計畫 (Cart Plan)，接著檢索候選商品、驗證限制條件，最後組合成購物車清單。這種設計讓 AI 從「搜尋商品」轉向「完成任務」，更貼近真實商業場景。

---

🛠 工作流程分解

1. 需求理解
- 使用者輸入自然語言或圖片 (如「準備 4 人份 Taco 晚餐」)。  
- 系統透過 LLM 將抽象需求轉換為結構化意圖：需要哪些食材類別、數量範圍、限制條件 (過敏、預算等)。

2. 購物計畫生成
- 建立 Cart Plan：一份中介層計畫，列出食材類別與角色。  
- 例如：玉米餅皮 → 主食；牛絞肉 → 蛋白質；莎莎醬 → 調味。  
- 這層設計避免直接跳到商品搜尋，降低漏項或誤選。

3. 候選商品檢索
- 從商店目錄檢索符合 Cart Plan 的商品。  
- 加入商品 metadata：價格、促銷、庫存狀態、單位規格。  
- 這一步由後端 API 完成，確保資料準確。

4. 語意與限制驗證
- LLM 判斷候選商品是否符合語意需求。  
- 系統再檢查限制條件：價格上限、飲食偏好、庫存可用性。  
- 避免「看似合理但不可購買」的錯誤。

5. 數量規劃
- 雜貨購物的難點：判斷份量。  
- 例如：4 人份牛肉要買多少？莎莎醬需要幾罐？  
- 系統需根據食材角色與份量規則，生成合理數量。

6. 購物車生成
- 整合所有驗證後的商品，生成購物車清單。  
- 使用者可直接確認或調整，最後送出訂單。

---

🔑 技術亮點
- Multi-Prompt State Graph：每一步由不同 LLM/系統模組處理，避免一次生成錯誤難以追蹤。  
- Guardrails 防護機制：檢查商品類別、完整性、可用性，確保結果可用。  
- Evaluation-Driven Development：評測標準不只看回答正確，而是任務是否完成。

---

⚠️ 工程挑戰
- 延遲：多階段流程可能導致反應時間變長。  
- 成本：每一步都需 API/LLM 呼叫，需平衡準確率與效能。  
- 數量規劃：最難自動化，仍需持續優化。  

